<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./images/vs-code.png">
    <link rel="stylesheet" href="style.css">
    <title>Vs Code</title>
</head>
<body>
    <main>
        <header>
            <div class="logo-div">
                <img src="./images/vs-code.png">
                <h2>Vs Code</h2>
            </div>
            <ul>
                <li>Docs</li>
                <li>Updates</li>
                <li>Blog</li>
                <li>API</li>
                <li>Extensions</li>
                <li>FAQ</li>
                <li>GitHub Copilot</li>
            </ul>
            <div class="input-div">
                <input type="text" placeholder="Search Docs">
                <button>Download</button>
            </div>

            <div class="boger-menu">
                <div class="boger"></div>
                <div class="boger"></div>
                <div class="boger"></div>
                
            </div>
        </header>

        <div class="hero">
            <div class="inner-hero">
                <h1>Your code editor. Redefined with AI.</h1>
            <div>
                <button class="hero-btns one">
                    Download for Windows
                </button>
                <button class="hero-btns">
                    Get Copilot Free
                </button>
            </div>
            </div>
        </div>

        <div class="imp-div">
            <img src="https://code.visualstudio.com/assets/home/swimlane-chat-dark.webp" class="imp-img">
        </div>
    </main>

</html>
